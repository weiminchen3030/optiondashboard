name: Options Signal Pipeline

on:
  schedule:
    # Run daily at 9 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run day-0 signal generation
      run: python scripts/run_pipeline.py

    - name: Run confirmation (next day)
      run: python scripts/run_pipeline.py --confirm

    - name: Generate report
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        from options_signal_pipeline.pipeline import load_signals
        import json
        from datetime import datetime
        
        # Load both day0 and confirmed signals
        day0_signals = load_signals()
        confirmed_signals = [s for s in day0_signals if s.get('signal_type') == 'confirmed']
        
        report = {
            'date': datetime.now().strftime('%Y-%m-%d'),
            'day0_signals_count': len([s for s in day0_signals if s.get('signal_type') == 'day0']),
            'confirmed_signals_count': len(confirmed_signals),
            'confirmed_signals': confirmed_signals
        }
        
        with open('daily_report.json', 'w') as f:
            json.dump(report, f, indent=2)
        print('Report generated with', len(confirmed_signals), 'confirmed signals')
        "

    - name: Commit report
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add daily_report.json
        git commit -m "Daily report: $(date)" || echo "No changes to commit"
        git push
